name: Despliegue de Red Vault

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    # Este evento "update-notes" puede ser llamado desde el repositorio 'red vault'
    # mediante un GitHub Action allí que haga un webhook post, o manualmente mediante API
    types: [update-notes]
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Checkout del código web (Quartz)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Necesario para las fechas de última modificación de git
          
      - name: 2. Checkout de las notas (Red Vault) a carpeta temporal
        uses: actions/checkout@v6
        with:
          repository: n1krov/red_vault 
          path: tmp_obsidian
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          
      - name: 3. Mover notas a content pero preservar index.md
        run: |
          # No eliminamos content/index.md, copiamos el resto de las notas
          # Esto evita que se sobrescriba el index.md de la web
          cp -r tmp_obsidian/* content/ || true
          cp -r tmp_obsidian/.[!.]* content/ || true
          rm -rf tmp_obsidian
          
      - name: 4. Configurar Node.js v22 y Formatear notas
        uses: actions/setup-node@v6
        with:
          node-version: 22
          
      - name: 4.5. Sanitizar notas de Obsidian mal formateadas
        run: pip install pyyaml && python3 sanitize_frontmatter.py
        
      - name: 5. Instalar dependencias
        run: npm ci
        
      - name: 6. Construir Quartz
        run: npx quartz build
        
      - name: 7. Subir el sitio generado como artefacto
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 8. Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
